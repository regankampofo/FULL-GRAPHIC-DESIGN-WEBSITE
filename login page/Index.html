<DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kradus Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="login-card" aria-label="Kradus sign up page">
        <div class="promo-panel">
          <header class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>KRADUS</span>
          </header>

          <div class="promo-copy">
            <h1>Don&rsquo;t have an<br />account?</h1>
            <p>
              Register to access all features of our service.<br />
              Manage your business in one place. It&rsquo;s free!
            </p>
            <nav class="social-links" aria-label="Social links">
              <a href="#" aria-label="Facebook">f</a>
              <a href="#" aria-label="Instagram">◎</a>
              <a href="#" aria-label="Twitter">♥</a>
              <a href="#" aria-label="Google Plus">G+</a>
            </nav>
          </div>
        </div>

        <form class="signup-panel">
          <h2>Sign up</h2>

          <label class="field">
            <span>E-mail</span>
            <input type="email" value="alongboboto@yahoo.com" aria-label="E-mail" />
          </label>

          <label class="field icon-warning">
            <span>Login</span>
            <input type="text" aria-label="Login" />
          </label>

          <label class="field icon-key">
            <span>Password</span>
            <input type="password" value="password123" aria-label="Password" />
          </label>

          <label class="terms">
            <input type="checkbox" />
            <span>I agree to the&nbsp;<a href="#">Terms of service</a></span>
          </label>

          <div class="actions">
            <button type="submit">
              <span>Sign Up</span>
              <span aria-hidden="true">›</span>
            </button>
            <a class="signin-link" href="#">Have an account?</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
